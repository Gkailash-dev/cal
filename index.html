
<style>
  .calc-wrap { display: flex; justify-content: center; padding: 2rem 0; }
  .calc { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); width: 280px; overflow: hidden; }
  .display { padding: 1.25rem 1rem 0.75rem; text-align: right; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .display .expr { font-size: 13px; color: var(--color-text-tertiary); min-height: 18px; }
  .display .num { font-size: 32px; font-weight: 500; color: var(--color-text-primary); font-variant-numeric: tabular-nums; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--color-border-tertiary); }
  .btn { padding: 0; border: none; background: var(--color-background-primary); font-size: 16px; height: 60px; cursor: pointer; color: var(--color-text-primary); transition: background 0.1s; }
  .btn:hover { background: var(--color-background-secondary); }
  .btn:active { background: var(--color-background-tertiary); transform: scale(0.97); }
  .btn.op { color: var(--color-text-info); font-weight: 500; }
  .btn.fn { font-size: 14px; color: var(--color-text-secondary); }
  .btn.eq { background: var(--color-background-info); color: var(--color-text-info); font-weight: 500; }
  .btn.eq:hover { filter: brightness(0.95); }
  .btn.zero { grid-column: span 2; }
</style>
<div class="calc-wrap">
  <div class="calc">
    <h2 class="sr-only">Calculator</h2>
    <div class="display">
      <div class="expr" id="expr"></div>
      <div class="num" id="display">0</div>
    </div>
    <div class="buttons">
      <button class="btn fn" data-action="clear">AC</button>
      <button class="btn fn" data-action="sign">+/−</button>
      <button class="btn fn" data-action="percent">%</button>
      <button class="btn op" data-action="op" data-val="÷">÷</button>

      <button class="btn" data-action="digit" data-val="7">7</button>
      <button class="btn" data-action="digit" data-val="8">8</button>
      <button class="btn" data-action="digit" data-val="9">9</button>
      <button class="btn op" data-action="op" data-val="×">×</button>

      <button class="btn" data-action="digit" data-val="4">4</button>
      <button class="btn" data-action="digit" data-val="5">5</button>
      <button class="btn" data-action="digit" data-val="6">6</button>
      <button class="btn op" data-action="op" data-val="−">−</button>

      <button class="btn" data-action="digit" data-val="1">1</button>
      <button class="btn" data-action="digit" data-val="2">2</button>
      <button class="btn" data-action="digit" data-val="3">3</button>
      <button class="btn op" data-action="op" data-val="+">+</button>

      <button class="btn zero" data-action="digit" data-val="0">0</button>
      <button class="btn" data-action="dot">.</button>
      <button class="btn eq" data-action="equals">=</button>
    </div>
  </div>
</div>
<script>
  let cur = '0', prev = null, op = null, reset = false;
  const disp = document.getElementById('display');
  const expr = document.getElementById('expr');

  function fmt(n) {
    const s = parseFloat(n.toPrecision(10)).toString();
    return s.length > 12 ? parseFloat(n.toPrecision(8)).toString() : s;
  }
  function update() { disp.textContent = cur; }

  document.querySelector('.buttons').addEventListener('click', e => {
    const btn = e.target.closest('.btn');
    if (!btn) return;
    const { action, val } = btn.dataset;

    if (action === 'digit') {
      if (cur === '0' || reset) { cur = val; reset = false; }
      else if (cur.length < 12) cur += val;
      update();
    } else if (action === 'dot') {
      if (reset) { cur = '0.'; reset = false; }
      else if (!cur.includes('.')) cur += '.';
      update();
    } else if (action === 'clear') {
      cur = '0'; prev = null; op = null; reset = false; expr.textContent = '';
      update();
    } else if (action === 'sign') {
      cur = fmt(parseFloat(cur) * -1); update();
    } else if (action === 'percent') {
      cur = fmt(parseFloat(cur) / 100); update();
    } else if (action === 'op') {
      if (op && !reset) {
        const res = calc(parseFloat(prev), parseFloat(cur), op);
        cur = fmt(res); update();
      }
      prev = cur; op = val; reset = true;
      expr.textContent = prev + ' ' + op;
    } else if (action === 'equals') {
      if (!op) return;
      const a = parseFloat(prev), b = parseFloat(cur);
      expr.textContent = prev + ' ' + op + ' ' + cur + ' =';
      cur = fmt(calc(a, b, op));
      op = null; prev = null; reset = true;
      update();
    }
  });

  function calc(a, b, o) {
    if (o === '+') return a + b;
    if (o === '−') return a - b;
    if (o === '×') return a * b;
    if (o === '÷') return b === 0 ? 0 : a / b;
  }
</script>
